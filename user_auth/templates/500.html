{% extends "base.html" %}

{% block title %}服务器错误 - 用户登录系统{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-icon">
            <i class="fas fa-server fa-5x"></i>
        </div>
        <h1>500 - 服务器内部错误</h1>
        <p class="error-message">抱歉，服务器遇到了意外错误，无法完成您的请求。</p>
        
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <a href="javascript:location.reload()" class="btn btn-secondary">
                <i class="fas fa-redo"></i> 刷新页面
            </a>
        </div>
        
        <div class="error-help">
            <h3><i class="fas fa-life-ring"></i> 您可以尝试：</h3>
            <ul>
                <li>稍后重试此操作</li>
                <li>清除浏览器缓存和Cookie</li>
                <li>联系系统管理员</li>
                <li>检查网络连接</li>
            </ul>
            
            <div class="admin-contact">
                <h4><i class="fas fa-envelope"></i> 技术支持</h4>
                <p>如果问题持续存在，请联系系统管理员：</p>
                <p><strong>邮箱：</strong> admin@example.com</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
